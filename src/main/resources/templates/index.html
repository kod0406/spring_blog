<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWT Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{background:#f7f8fa}.navbar-brand{font-weight:700}.post-title{text-decoration:none;color:#1f2937}.post-title:hover{color:#0d6efd}</style>
</head>
<body>
<div th:replace="~{fragments/common :: navbar('home')}"></div>

<main class="container py-4">
    <div th:replace="~{fragments/common :: flash}"></div>
    <section class="mb-4">
        <h1 class="h3 mb-3">최근 글</h1>
        <div class="mb-3">
            <a class="btn btn-sm btn-dark me-1" href="/posts">전체</a>
            <a th:each="category : ${categories}" class="btn btn-sm btn-outline-dark me-1"
               th:href="@{/posts(category=${category.key})}"
               th:text="${category.displayName}">글머리</a>
        </div>
    </section>
    <section th:if="${posts.size() > 0}">
        <article class="card mb-3" th:each="post, iter : ${posts}">
            <div class="card-body">
                <div th:if="${post.masked}" class="text-muted fst-italic">
                    <span th:text="${iter.index + 1}">1</span>
                    <span class="ms-2">(권한 없음)</span>
                </div>
                <div th:unless="${post.masked}">
                    <div class="small text-muted mb-1" th:text="${post.categoryDisplayName}">미분류</div>
                    <h2 class="h5"><a class="post-title" th:href="@{/posts/{id}(id=${post.postId})}" th:text="${post.title}">제목</a></h2>
                    <p class="text-muted mb-2" th:text="${#strings.abbreviate(post.content, 140)}">요약</p>
                    <small class="text-muted">
                        <span th:text="${post.authorName}">작성자</span>
                        ·
                        <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">작성일</span>
                    </small>
                </div>
            </div>
        </article>
    </section>
    <section th:if="${posts.size() == 0}" class="text-center bg-white border rounded p-5">
        <h2 class="h5 text-muted">아직 공개된 글이 없습니다.</h2>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
