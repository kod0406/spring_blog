<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>간단 게시판</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero-section {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            padding: 100px 0;
            text-align: center;
        }
        .feature-card {
            margin-bottom: 2rem;
            transition: transform 0.3s;
        }
        .feature-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body>

    <!-- 네비게이션 바 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">간단 게시판</a>

            <div class="navbar-nav ms-auto">
                <div sec:authorize="isAuthenticated()">
                    <a class="nav-link d-inline" href="/board">게시판</a>
                    <a class="nav-link d-inline" href="/board/write">글쓰기</a>
                </div>
                <div sec:authorize="!isAuthenticated()">
                    <a class="nav-link d-inline" href="/login">로그인</a>
                    <a class="nav-link d-inline ms-2" href="/register">회원가입</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 메시지 표시 -->
    <div class="container mt-3">
        <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    </div>

    <!-- 히어로 섹션 -->
    <section class="hero-section">
        <div class="container">
            <h1 class="display-4 fw-bold mb-4">간단 게시판에 오신 것을 환영합니다!</h1>
            <p class="lead mb-4">자유롭게 소통하고 정보를 공유하는 공간입니다.</p>

            <div sec:authorize="!isAuthenticated()">
                <a href="/login" class="btn btn-light btn-lg me-3">로그인</a>
                <a href="/register" class="btn btn-outline-light btn-lg">회원가입</a>
            </div>
        </div>
    </section>

    <!-- 특징 섹션 -->
    <section class="py-5">
        <div class="container">
            <div class="row text-center">
                <div class="col-md-4">
                    <div class="card feature-card h-100">
                        <div class="card-body">
                            <div class="mb-3">
                            </div>
                            <h5 class="card-title">소통</h5>
                            <p class="card-text">다른 사용자들과 자유롭게 소통하고 의견을 나눠보세요.</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card feature-card h-100">
                        <div class="card-body">
                            <div class="mb-3">
                            </div>
                            <h5 class="card-title">정보 공유</h5>
                            <p class="card-text">유용한 정보와 지식을 공유하여 함께 성장해요.</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card feature-card h-100">
                        <div class="card-body">
                            <div class="mb-3">
                            </div>
                            <h5 class="card-title">안전한 환경</h5>
                            <p class="card-text">안전하고 신뢰할 수 있는 환경에서 활동하세요.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 시작하기 섹션 -->
    <section class="bg-light py-5" sec:authorize="!isAuthenticated()">
        <div class="container text-center">
            <h2 class="mb-4">지금 시작해보세요!</h2>
            <p class="lead mb-4">간단한 회원가입으로 다양한 기능을 이용할 수 있습니다.</p>
            <a href="/register" class="btn btn-primary btn-lg">회원가입하기</a>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
