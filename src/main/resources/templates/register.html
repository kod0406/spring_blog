<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 간단 게시판</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- 네비게이션 바 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">간단 게시판</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/login">로그인</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h3 class="text-center">회원가입</h3>
                    </div>
                    <div class="card-body">
                        <!-- 메시지 표시 -->
                        <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
                            <span th:text="${message}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                            <span th:text="${error}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <!-- 이메일 인증 상태 메시지 -->
                        <div id="emailVerificationMessage" style="display: none;"></div>

                        <form th:action="@{/register}" method="post" th:object="${registrationDto}">
                            <div class="mb-3">
                                <label for="name" class="form-label">이름</label>
                                <input type="text" class="form-control" id="name" th:field="*{name}" required>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">이메일</label>
                                <div class="input-group">
                                    <input type="email" class="form-control" id="email" th:field="*{email}" required>
                                    <button type="button" class="btn btn-outline-primary" id="sendVerificationBtn">
                                        인증코드 발송
                                    </button>
                                </div>
                                <div class="form-text">이메일로 발송된 인증 코드를 입력해주세요.</div>
                            </div>

                            <div class="mb-3">
                                <label for="verificationCode" class="form-label">이메일 인증 코드</label>
                                <input type="text" class="form-control" id="verificationCode" th:field="*{verificationCode}"
                                       placeholder="6자리 인증 코드를 입력하세요" required>
                                <div class="form-text">인증 코드는 5분 후 만료됩니다.</div>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">비밀번호</label>
                                <input type="password" class="form-control" id="password" th:field="*{password}" required>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">회원가입</button>
                            </div>
                        </form>

                        <div class="text-center mt-3">
                            <p>이미 계정이 있으신가요? <a href="/login">로그인</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 인증 코드 발송 버튼 이벤트
        document.getElementById('sendVerificationBtn').addEventListener('click', function() {
            const emailInput = document.getElementById('email');
            const email = emailInput.value.trim();
            const messageDiv = document.getElementById('emailVerificationMessage');

            if (!email) {
                showMessage('이메일을 입력해주세요.', 'danger');
                return;
            }

            // 이메일 형식 검증
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('올바른 이메일 형식을 입력해주세요.', 'danger');
                return;
            }

            // 버튼 비활성화
            this.disabled = true;
            this.textContent = '발송 중...';

            // AJAX 요청
            fetch('/email/send-verification', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ email: email })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    showMessage(data.message, 'success');
                    // 60초 후 버튼 재활성화
                    let countdown = 60;
                    const button = this;
                    const interval = setInterval(() => {
                        button.textContent = `재발송 (${countdown}초)`;
                        countdown--;
                        if (countdown < 0) {
                            clearInterval(interval);
                            button.disabled = false;
                            button.textContent = '인증코드 발송';
                        }
                    }, 1000);
                } else {
                    showMessage(data.message, 'danger');
                    this.disabled = false;
                    this.textContent = '인증코드 발송';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showMessage('인증 코드 발송에 실패했습니다.', 'danger');
                this.disabled = false;
                this.textContent = '인증코드 발송';
            });
        });

        function showMessage(message, type) {
            const messageDiv = document.getElementById('emailVerificationMessage');
            messageDiv.className = `alert alert-${type} alert-dismissible fade show`;
            messageDiv.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            messageDiv.style.display = 'block';

            // 5초 후 자동 숨김
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
