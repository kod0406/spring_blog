<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원 관리 - JWT Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{background:#f7f8fa}.navbar-brand{font-weight:700}</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">JWT Blog</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/admin/posts">글 관리</a>
            <a class="nav-link" href="/admin/categories">글머리</a>
            <a class="nav-link active" href="/admin/users">회원</a>
            <a class="nav-link" href="/admin/comments">댓글</a>
            <form sec:authorize="isAuthenticated()" class="d-inline" th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-light btn-sm ms-2">로그아웃</button>
            </form>
        </div>
    </div>
</nav>
<main class="container py-4">
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <h1 class="h3 mb-3">회원 관리</h1>
    <form class="row g-2 mb-3" method="get" action="/admin/users">
        <div class="col-md-3">
            <select class="form-select" name="status">
                <option value="all" th:selected="${status == 'all'}">전체</option>
                <option value="PENDING" th:selected="${status == 'PENDING'}">승인 대기</option>
                <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">활성</option>
                <option value="REJECTED" th:selected="${status == 'REJECTED'}">거절</option>
            </select>
        </div>
        <div class="col-md-2">
            <button class="btn btn-outline-primary w-100" type="submit">필터</button>
        </div>
    </form>
    <div class="bg-white border rounded p-3">
        <div th:if="${users.size() == 0}" class="text-muted">회원이 없습니다.</div>
        <div th:each="member : ${users}" class="border-bottom py-3">
            <form th:action="@{/admin/users/{id}(id=${member.userId})}" method="post" class="row g-2 align-items-end">
                <div class="col-md-3"><strong th:text="${member.email}">email</strong><div class="text-muted" th:text="${member.name}">name</div></div>
                <div class="col-md-2">
                    <label class="form-label">역할</label>
                    <select class="form-select" name="role">
                        <option value="ADMIN" th:selected="${member.role == 'ADMIN'}">ADMIN</option>
                        <option value="USER" th:selected="${member.role == 'USER'}">USER</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">상태</label>
                    <select class="form-select" name="status">
                        <option value="PENDING" th:selected="${member.status == 'PENDING'}">PENDING</option>
                        <option value="ACTIVE" th:selected="${member.status == 'ACTIVE'}">ACTIVE</option>
                        <option value="REJECTED" th:selected="${member.status == 'REJECTED'}">REJECTED</option>
                    </select>
                </div>
                <div class="col-md-2"><button class="btn btn-outline-primary w-100" type="submit">저장</button></div>
            </form>
            <div th:if="${member.status == 'PENDING'}" class="d-flex gap-2 mt-2">
                <form th:action="@{/admin/users/{id}/approve(id=${member.userId})}" method="post">
                    <button class="btn btn-success btn-sm" type="submit">승인</button>
                </form>
                <form th:action="@{/admin/users/{id}/reject(id=${member.userId})}" method="post">
                    <button class="btn btn-outline-danger btn-sm" type="submit">거절</button>
                </form>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
