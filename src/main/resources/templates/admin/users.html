<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>회원 관리 - kod04061's Blog</title><th:block th:replace="~{fragments/common :: bootstrapCss}"></th:block></head>
<body>
<a class="skip-link" href="#main-content">본문으로 건너뛰기</a><div th:replace="~{fragments/common :: adminNavbar('users')}"></div>
<main id="main-content" class="container site-main"><div th:replace="~{fragments/common :: flash}"></div>
    <header class="page-heading"><span class="eyebrow">Members</span><h1>회원 관리</h1><p>가입 승인 상태와 역할을 검토하고 변경합니다.</p></header>
    <form class="filter-card" method="get" action="/admin/users"><div class="row g-2"><div class="col-sm-8 col-md-4"><label class="filter-label" for="memberStatus">회원 상태</label><select class="form-select" id="memberStatus" name="status"><option value="all" th:selected="${status == 'all'}">전체</option><option value="PENDING" th:selected="${status == 'PENDING'}">승인 대기</option><option value="ACTIVE" th:selected="${status == 'ACTIVE'}">활성</option><option value="REJECTED" th:selected="${status == 'REJECTED'}">거절</option></select></div><div class="col-sm-4 col-md-2 d-grid"><button class="btn btn-primary" type="submit">필터 적용</button></div></div></form>
    <section class="admin-panel"><div class="admin-panel-header"><h2>회원 목록</h2><span class="text-body-secondary small" th:text="${users.size()} + '명'">0명</span></div>
        <div th:if="${users.size() == 0}" class="empty-state"><div class="empty-state-icon" aria-hidden="true">U</div><h2>조건에 맞는 회원이 없습니다</h2><p>다른 상태를 선택해 보세요.</p></div>
        <div th:if="${users.size() > 0}" class="admin-list"><article th:each="member : ${users}" class="admin-item">
            <form th:action="@{/admin/users/{id}(id=${member.userId})}" method="post" class="row g-2 align-items-end">
                <div class="col-md-5"><div class="admin-item-meta">회원 #<span th:text="${member.userId}">0</span></div><strong class="d-block" th:text="${member.email}">email</strong><span class="text-body-secondary" th:text="${member.name}">name</span></div>
                <div class="col-sm-6 col-md-2"><label class="filter-label" th:for="${'role-' + member.userId}">역할</label><select class="form-select" th:id="${'role-' + member.userId}" name="role"><option value="ADMIN" th:selected="${member.role == 'ADMIN'}">ADMIN</option><option value="USER" th:selected="${member.role == 'USER'}">USER</option></select></div>
                <div class="col-sm-6 col-md-2"><label class="filter-label" th:for="${'status-' + member.userId}">상태</label><select class="form-select" th:id="${'status-' + member.userId}" name="status"><option value="PENDING" th:selected="${member.status == 'PENDING'}">PENDING</option><option value="ACTIVE" th:selected="${member.status == 'ACTIVE'}">ACTIVE</option><option value="REJECTED" th:selected="${member.status == 'REJECTED'}">REJECTED</option></select></div>
                <div class="col-md-3 d-grid"><button class="btn btn-outline-primary" type="submit">변경 저장</button></div>
            </form>
            <div th:if="${member.status == 'PENDING'}" class="d-flex gap-2 mt-3 pt-3 border-top"><form th:action="@{/admin/users/{id}/approve(id=${member.userId})}" method="post"><button class="btn btn-success btn-sm" type="submit">가입 승인</button></form><form th:action="@{/admin/users/{id}/reject(id=${member.userId})}" method="post" data-confirm-title="가입 거절" data-confirm="이 회원의 가입을 거절하시겠습니까?" data-confirm-button="거절"><button class="btn btn-outline-danger btn-sm" type="submit">가입 거절</button></form></div>
        </article></div>
    </section>
</main>
<th:block th:replace="~{fragments/common :: footer}"></th:block><th:block th:replace="~{fragments/common :: bootstrapScript}"></th:block>
</body></html>
