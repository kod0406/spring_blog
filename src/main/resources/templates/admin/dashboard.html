<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리 - JWT Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{background:#f7f8fa}.navbar-brand{font-weight:700}</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">JWT Blog</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/posts">글 목록</a>
            <a class="nav-link active" href="/admin">관리</a>
            <form sec:authorize="isAuthenticated()" class="d-inline" th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-light btn-sm ms-2">로그아웃</button>
            </form>
        </div>
    </div>
</nav>
<main class="container py-4">
    <h1 class="h3 mb-4">관리 대시보드</h1>
    <div class="row g-3">
        <div class="col-md-3"><a class="card card-body text-decoration-none" href="/admin/posts"><strong th:text="${posts}">0</strong><span>글</span></a></div>
        <div class="col-md-3"><a class="card card-body text-decoration-none" href="/admin/categories"><strong th:text="${categories}">0</strong><span>글머리</span></a></div>
        <div class="col-md-3"><a class="card card-body text-decoration-none" href="/admin/users"><strong th:text="${users}">0</strong><span>회원</span></a></div>
        <div class="col-md-3"><a class="card card-body text-decoration-none" href="/admin/comments"><strong th:text="${comments}">0</strong><span>댓글</span></a></div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
