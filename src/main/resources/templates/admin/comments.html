<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>댓글 관리 - JWT Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{background:#f7f8fa}.navbar-brand{font-weight:700}</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">JWT Blog</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/admin/posts">글 관리</a>
            <a class="nav-link" href="/admin/categories">글머리</a>
            <a class="nav-link" href="/admin/users">회원</a>
            <a class="nav-link active" href="/admin/comments">댓글</a>
            <form sec:authorize="isAuthenticated()" class="d-inline" th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-light btn-sm ms-2">로그아웃</button>
            </form>
        </div>
    </div>
</nav>
<main class="container py-4">
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <h1 class="h3 mb-3">댓글 관리</h1>
    <form class="row g-2 mb-3" method="get" action="/admin/comments">
        <div class="col-md-2">
            <input class="form-control" type="number" name="postId" th:value="${postId}" placeholder="글 ID">
        </div>
        <div class="col-md-2">
            <input class="form-control" name="author" th:value="${author}" placeholder="작성자">
        </div>
        <div class="col-md-2">
            <select class="form-select" name="deleted">
                <option value="" th:selected="${deleted == null}">삭제 여부 전체</option>
                <option value="false" th:selected="${deleted == false}">일반 댓글</option>
                <option value="true" th:selected="${deleted == true}">삭제된 댓글</option>
            </select>
        </div>
        <div class="col-md-3">
            <input class="form-control" name="keyword" th:value="${keyword}" placeholder="키워드">
        </div>
        <div class="col-md-2">
            <button class="btn btn-outline-primary w-100" type="submit">필터</button>
        </div>
    </form>
    <div class="bg-white border rounded p-3">
        <div th:if="${comments.size() == 0}" class="text-muted">댓글이 없습니다.</div>
        <div th:each="comment : ${comments}" class="border-bottom py-3">
            <div class="d-flex justify-content-between">
                <div>
                    <div class="small text-muted">
                        글 #<span th:text="${comment.postId}">0</span>
                        · 댓글 #<span th:text="${comment.commentId}">0</span>
                        · <span th:text="${comment.authorName}">작성자</span>
                    </div>
                    <div th:text="${comment.content}">내용</div>
                </div>
                <form th:if="${!comment.deleted}" th:action="@{/admin/comments/{id}/delete(id=${comment.commentId})}" method="post">
                    <button class="btn btn-outline-danger btn-sm" type="submit">삭제</button>
                </form>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
