<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글머리 설정 - JWT Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{background:#f7f8fa}.navbar-brand{font-weight:700}.category-row{border-bottom:1px solid #e5e7eb}.category-row:last-child{border-bottom:0}</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">JWT Blog</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/posts">글 목록</a>
            <a class="nav-link" href="/admin/posts/new">글쓰기</a>
            <a class="nav-link active" href="/admin/settings/categories">글머리</a>
            <form sec:authorize="isAuthenticated()" class="d-inline" th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-light btn-sm ms-2">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <section class="bg-white border rounded p-4 mb-4">
        <h1 class="h4 mb-3">글머리 생성</h1>
        <form th:action="@{/admin/settings/categories}" method="post" th:object="${categoryDto}" class="row g-3">
            <div class="col-md-3">
                <label class="form-label" for="key">URL key</label>
                <input class="form-control" id="key" th:field="*{key}" placeholder="public" required>
            </div>
            <div class="col-md-3">
                <label class="form-label" for="displayName">표시 이름</label>
                <input class="form-control" id="displayName" th:field="*{displayName}" placeholder="💬" required>
            </div>
            <div class="col-md-4">
                <label class="form-label" for="description">설명</label>
                <input class="form-control" id="description" th:field="*{description}">
            </div>
            <div class="col-md-2">
                <label class="form-label" for="sortOrder">정렬</label>
                <input class="form-control" id="sortOrder" type="number" th:field="*{sortOrder}" value="0">
            </div>
            <div class="col-12">
                <button class="btn btn-primary" type="submit">생성</button>
            </div>
        </form>
    </section>

    <section class="bg-white border rounded p-4">
        <h2 class="h4 mb-3">글머리 목록</h2>
        <div th:if="${categories.size() == 0}" class="text-muted">아직 글머리가 없습니다.</div>
        <div th:each="category : ${categories}" class="category-row py-3">
            <form th:action="@{/admin/settings/categories/{id}/edit(id=${category.categoryId})}" method="post" class="row g-2 align-items-end">
                <div class="col-md-2">
                    <label class="form-label">URL key</label>
                    <div><code th:text="${category.key}">public</code></div>
                </div>
                <div class="col-md-2">
                    <label class="form-label">표시 이름</label>
                    <input class="form-control" name="displayName" th:value="${category.displayName}" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">설명</label>
                    <input class="form-control" name="description" th:value="${category.description}">
                </div>
                <div class="col-md-2">
                    <label class="form-label">정렬</label>
                    <input class="form-control" type="number" name="sortOrder" th:value="${category.sortOrder}">
                </div>
                <div class="col-md-2">
                    <label class="form-label">상태</label>
                    <select class="form-select" name="active">
                        <option value="true" th:selected="${category.active}">활성</option>
                        <option value="false" th:selected="${!category.active}">비활성</option>
                    </select>
                </div>
                <div class="col-md-1 d-grid">
                    <button class="btn btn-outline-primary btn-sm" type="submit">수정</button>
                </div>
            </form>
            <form th:action="@{/admin/settings/categories/{id}/delete(id=${category.categoryId})}" method="post" class="mt-2">
                <button class="btn btn-outline-danger btn-sm" type="submit">삭제</button>
            </form>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
