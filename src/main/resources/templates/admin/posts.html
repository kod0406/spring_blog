<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글 관리 - JWT Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{background:#f7f8fa}.navbar-brand{font-weight:700}.post-title{text-decoration:none;color:#1f2937}</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">JWT Blog</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/posts">글 목록</a>
            <a class="nav-link active" href="/admin/posts">글 관리</a>
            <a class="nav-link" href="/admin/categories">글머리</a>
            <a class="nav-link" href="/admin/users">회원</a>
            <a class="nav-link" href="/admin/comments">댓글</a>
            <form sec:authorize="isAuthenticated()" class="d-inline" th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-light btn-sm ms-2">로그아웃</button>
            </form>
        </div>
    </div>
</nav>
<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">글 관리</h1>
        <a href="/admin/posts/new" class="btn btn-primary">새 글</a>
    </div>
    <form class="row g-2 mb-3" method="get" action="/admin/posts">
        <div class="col-md-3">
            <select class="form-select" name="visibility">
                <option value="all" th:selected="${visibility == 'all'}">전체</option>
                <option value="public" th:selected="${visibility == 'public'}">공개 글머리</option>
                <option value="private" th:selected="${visibility == 'private'}">개인 글머리</option>
                <option value="unpublished" th:selected="${visibility == 'unpublished'}">비공개 글</option>
            </select>
        </div>
        <div class="col-md-3">
            <select class="form-select" name="category">
                <option value="">모든 글머리</option>
                <option th:each="category : ${categories}" th:value="${category.key}" th:selected="${selectedCategory == category.key}"
                        th:text="${category.displayName + ' - ' + category.visibility}">글머리</option>
            </select>
        </div>
        <div class="col-md-2"><button class="btn btn-outline-primary w-100" type="submit">필터</button></div>
    </form>
    <section th:if="${posts.content.size() > 0}">
        <article class="card mb-2" th:each="post : ${posts.content}">
            <div class="card-body d-flex justify-content-between gap-3">
                <div>
                    <div class="small text-muted">
                        <span th:text="${post.categoryDisplayName}">미분류</span>
                        <span th:if="${post.privatePost}" class="badge bg-secondary ms-1">PRIVATE</span>
                        <span th:if="${!post.published}" class="badge bg-warning text-dark ms-1">비공개</span>
                    </div>
                    <a class="post-title h5" th:href="@{/posts/{id}(id=${post.postId})}" th:text="${post.title}">제목</a>
                </div>
                <div class="btn-group align-self-start">
                    <a class="btn btn-outline-primary btn-sm" th:href="@{/admin/posts/{id}/edit(id=${post.postId})}">수정</a>
                    <form th:action="@{/admin/posts/{id}/delete(id=${post.postId})}" method="post">
                        <button class="btn btn-outline-danger btn-sm" type="submit">삭제</button>
                    </form>
                </div>
            </div>
        </article>
    </section>
    <div th:if="${posts.content.size() == 0}" class="text-center bg-white border rounded p-5 text-muted">글이 없습니다.</div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
