<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<th:block th:fragment="bootstrapCss">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</th:block>

<th:block th:fragment="toastEditorCss">
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css">
</th:block>

<style th:fragment="baseStyle">body{background:#f7f8fa}.navbar-brand{font-weight:700}</style>
</head>
<body>
<nav th:fragment="navbar(active)" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">JWT Blog</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:classappend="${active == 'posts'} ? ' active'" href="/posts">글 목록</a>
            <a sec:authorize="hasRole('ADMIN')" class="nav-link" th:classappend="${active == 'admin'} ? ' active'" href="/admin">관리</a>
            <form sec:authorize="hasRole('ADMIN')" class="d-inline" th:action="@{/admin/posts/drafts}" method="post">
                <button type="submit" class="nav-link btn btn-link" th:classappend="${active == 'write'} ? ' active'">글쓰기</button>
            </form>
            <a sec:authorize="!isAuthenticated()" class="nav-link" href="/login">로그인</a>
            <a sec:authorize="!isAuthenticated()" class="nav-link" href="/register">회원가입</a>
            <form sec:authorize="isAuthenticated()" class="d-inline" th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-light btn-sm ms-2">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div th:fragment="flash">
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
</div>

<nav th:fragment="adminNavbar(active)" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">JWT Blog</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/posts">글 목록</a>
            <a class="nav-link" th:classappend="${active == 'dashboard'} ? ' active'" href="/admin">관리</a>
            <a class="nav-link" th:classappend="${active == 'posts'} ? ' active'" href="/admin/posts">글 관리</a>
            <a class="nav-link" th:classappend="${active == 'categories'} ? ' active'" href="/admin/categories">글머리</a>
            <a class="nav-link" th:classappend="${active == 'users'} ? ' active'" href="/admin/users">회원</a>
            <a class="nav-link" th:classappend="${active == 'comments'} ? ' active'" href="/admin/comments">댓글</a>
            <form sec:authorize="isAuthenticated()" class="d-inline" th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-light btn-sm ms-2">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<nav th:fragment="authNavbar(active)" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">JWT Blog</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/posts">글 목록</a>
            <a th:if="${active != 'login'}" class="nav-link" href="/login">로그인</a>
            <a th:if="${active != 'register'}" class="nav-link" href="/register">회원가입</a>
        </div>
    </div>
</nav>

<th:block th:fragment="bootstrapScript">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</th:block>

<th:block th:fragment="toastEditorScript">
    <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
</th:block>
</body>
</html>
