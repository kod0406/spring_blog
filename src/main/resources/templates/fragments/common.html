<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<th:block th:fragment="bootstrapCss">
    <script>
        (() => {
            const root = document.documentElement;
            let storageAvailable = true;
            const read = key => {
                if (!storageAvailable) return null;
                try { return localStorage.getItem(key); }
                catch (error) { storageAvailable = false; return null; }
            };
            const storedTheme = read('kod04061-blog.theme');
            const storedFont = read('kod04061-blog.readerFont');
            const storedScale = read('kod04061-blog.readerScale');
            const systemDark = storageAvailable && window.matchMedia
                && window.matchMedia('(prefers-color-scheme: dark)').matches;
            root.dataset.bsTheme = !storageAvailable
                ? 'light'
                : (storedTheme === 'light' || storedTheme === 'dark' ? storedTheme : (systemDark ? 'dark' : 'light'));
            root.dataset.readerFont = storageAvailable ? (storedFont || 'sans') : 'sans';
            root.dataset.readerScale = storageAvailable ? (storedScale || 'medium') : 'medium';
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/site.css}" href="/css/site.css">
</th:block>

<th:block th:fragment="toastEditorCss">
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css">
</th:block>
</head>
<body>
<nav th:fragment="navbar(active, readerTools)" class="navbar navbar-expand-lg site-navbar sticky-top" aria-label="주요 메뉴">
    <div class="container">
        <a class="navbar-brand" href="/" aria-label="kod04061's Blog 홈" th:attr="aria-current=${active == 'home'} ? 'page'">kod04061's<span>Blog</span></a>
        <div class="d-flex align-items-center gap-2 ms-auto d-lg-none">
            <button type="button" class="icon-button theme-toggle" data-theme-toggle aria-label="다크 모드로 전환">
                <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.66 6.34l1.41-1.41"></path></svg>
                <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20.5 14.4A8.5 8.5 0 0 1 9.6 3.5 8.5 8.5 0 1 0 20.5 14.4Z"></path></svg>
            </button>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#siteNavbar"
                    aria-controls="siteNavbar" aria-expanded="false" aria-label="메뉴 열기">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
        <div class="collapse navbar-collapse" id="siteNavbar">
            <div class="navbar-nav ms-auto align-items-lg-center">
                <a class="nav-link" th:classappend="${active == 'posts'} ? ' active'" th:attr="aria-current=${active == 'posts'} ? 'page'" href="/posts">글 목록</a>
                <a sec:authorize="hasRole('ADMIN')" class="nav-link" th:classappend="${active == 'admin'} ? ' active'" th:attr="aria-current=${active == 'admin'} ? 'page'" href="/admin">관리</a>
                <form sec:authorize="hasRole('ADMIN')" class="nav-form" th:action="@{/admin/posts/drafts}" method="post">
                    <button type="submit" class="nav-link" th:classappend="${active == 'write'} ? ' active'" th:attr="aria-current=${active == 'write'} ? 'page'">글쓰기</button>
                </form>
                <a sec:authorize="!isAuthenticated()" class="nav-link" href="/login">로그인</a>
                <a sec:authorize="!isAuthenticated()" class="nav-link nav-link-accent" href="/register">회원가입</a>
                <form sec:authorize="isAuthenticated()" class="nav-form" th:action="@{/logout}" method="post">
                    <button type="submit" class="nav-link">로그아웃</button>
                </form>
            </div>
            <div class="navbar-tools ms-lg-3">
                <details th:if="${readerTools}" class="reading-settings">
                    <summary class="icon-button" aria-label="가독성 설정">Aa</summary>
                    <div class="reading-settings-panel">
                        <fieldset>
                            <legend>글꼴</legend>
                            <label><input type="radio" name="readerFont" value="sans" data-reader-font> 산세리프</label>
                            <label><input type="radio" name="readerFont" value="serif" data-reader-font> 명조</label>
                            <label><input type="radio" name="readerFont" value="mono" data-reader-font> 고정폭</label>
                        </fieldset>
                        <fieldset>
                            <legend>글자 크기</legend>
                            <div class="segmented-control">
                                <label><input type="radio" name="readerScale" value="small" data-reader-scale><span>작게</span></label>
                                <label><input type="radio" name="readerScale" value="medium" data-reader-scale><span>보통</span></label>
                                <label><input type="radio" name="readerScale" value="large" data-reader-scale><span>크게</span></label>
                            </div>
                        </fieldset>
                    </div>
                </details>
                <button type="button" class="icon-button theme-toggle d-none d-lg-inline-flex" data-theme-toggle aria-label="다크 모드로 전환">
                    <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.66 6.34l1.41-1.41"></path></svg>
                    <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20.5 14.4A8.5 8.5 0 0 1 9.6 3.5 8.5 8.5 0 1 0 20.5 14.4Z"></path></svg>
                </button>
            </div>
        </div>
    </div>
</nav>

<nav th:fragment="adminNavbar(active)" class="navbar navbar-expand-lg site-navbar sticky-top" aria-label="관리 메뉴">
    <div class="container">
        <a class="navbar-brand" href="/">kod04061's<span>Blog</span><small>Admin</small></a>
        <div class="d-flex align-items-center gap-2 ms-auto d-lg-none">
            <button type="button" class="icon-button theme-toggle" data-theme-toggle aria-label="다크 모드로 전환">
                <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.66 6.34l1.41-1.41"></path></svg>
                <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20.5 14.4A8.5 8.5 0 0 1 9.6 3.5 8.5 8.5 0 1 0 20.5 14.4Z"></path></svg>
            </button>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNavbar"
                    aria-controls="adminNavbar" aria-expanded="false" aria-label="관리 메뉴 열기">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
        <div class="collapse navbar-collapse" id="adminNavbar">
            <div class="navbar-nav ms-auto align-items-lg-center">
                <a class="nav-link" href="/posts">블로그</a>
                <a class="nav-link" th:classappend="${active == 'dashboard'} ? ' active'" th:attr="aria-current=${active == 'dashboard'} ? 'page'" href="/admin">대시보드</a>
                <a class="nav-link" th:classappend="${active == 'posts'} ? ' active'" th:attr="aria-current=${active == 'posts'} ? 'page'" href="/admin/posts">글</a>
                <a class="nav-link" th:classappend="${active == 'categories'} ? ' active'" th:attr="aria-current=${active == 'categories'} ? 'page'" href="/admin/categories">글머리</a>
                <a class="nav-link" th:classappend="${active == 'users'} ? ' active'" th:attr="aria-current=${active == 'users'} ? 'page'" href="/admin/users">회원</a>
                <a class="nav-link" th:classappend="${active == 'comments'} ? ' active'" th:attr="aria-current=${active == 'comments'} ? 'page'" href="/admin/comments">댓글</a>
                <form class="nav-form" th:action="@{/logout}" method="post"><button type="submit" class="nav-link">로그아웃</button></form>
            </div>
            <div class="navbar-tools ms-lg-3">
                <button type="button" class="icon-button theme-toggle d-none d-lg-inline-flex" data-theme-toggle aria-label="다크 모드로 전환">
                    <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.66 6.34l1.41-1.41"></path></svg>
                    <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20.5 14.4A8.5 8.5 0 0 1 9.6 3.5 8.5 8.5 0 1 0 20.5 14.4Z"></path></svg>
                </button>
            </div>
        </div>
    </div>
</nav>

<nav th:fragment="authNavbar(active)" class="navbar navbar-expand-lg site-navbar" aria-label="인증 메뉴">
    <div class="container">
        <a class="navbar-brand" href="/">kod04061's<span>Blog</span></a>
        <div class="d-flex align-items-center gap-2 ms-auto d-lg-none">
            <button type="button" class="icon-button theme-toggle" data-theme-toggle aria-label="다크 모드로 전환">
                <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.66 6.34l1.41-1.41"></path></svg>
                <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20.5 14.4A8.5 8.5 0 0 1 9.6 3.5 8.5 8.5 0 1 0 20.5 14.4Z"></path></svg>
            </button>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#authNavbar"
                    aria-controls="authNavbar" aria-expanded="false" aria-label="메뉴 열기"><span class="navbar-toggler-icon"></span></button>
        </div>
        <div class="collapse navbar-collapse" id="authNavbar">
            <div class="navbar-nav ms-auto align-items-lg-center">
                <a class="nav-link" href="/posts">글 목록</a>
                <a th:if="${active != 'login'}" class="nav-link" href="/login">로그인</a>
                <a th:if="${active != 'register'}" class="nav-link nav-link-accent" href="/register">회원가입</a>
            </div>
            <div class="navbar-tools ms-lg-3">
                <button type="button" class="icon-button theme-toggle d-none d-lg-inline-flex" data-theme-toggle aria-label="다크 모드로 전환">
                    <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.66 6.34l1.41-1.41"></path></svg>
                    <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20.5 14.4A8.5 8.5 0 0 1 9.6 3.5 8.5 8.5 0 1 0 20.5 14.4Z"></path></svg>
                </button>
            </div>
        </div>
    </div>
</nav>

<div th:fragment="flash" class="flash-stack" aria-live="polite">
    <div th:if="${message}" class="alert alert-success" role="status" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>
</div>

<th:block th:fragment="footer">
    <footer class="site-footer">
        <div class="container site-footer-inner">
            <div><a class="footer-brand" href="/">kod04061's Blog</a><p>개인용 블로그.</p></div>
            <nav aria-label="하단 메뉴"><a href="/">홈</a><a href="/posts">글 목록</a><a href="/login">로그인</a></nav>
            <small>© kod04061's Blog. All rights reserved.</small>
        </div>
    </footer>
    <div class="modal fade" id="confirmActionModal" tabindex="-1" aria-labelledby="confirmActionTitle" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered"><div class="modal-content">
            <div class="modal-header"><h2 class="modal-title fs-5" id="confirmActionTitle">작업 확인</h2><button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="닫기"></button></div>
            <div class="modal-body" id="confirmActionMessage">이 작업을 진행하시겠습니까?</div>
            <div class="modal-footer"><button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">취소</button><button type="button" class="btn btn-danger" data-confirm-submit>진행</button></div>
        </div></div>
    </div>
</th:block>

<th:block th:fragment="bootstrapScript">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    <script th:src="@{/js/site-preferences.js}" src="/js/site-preferences.js"></script>
</th:block>

<th:block th:fragment="toastEditorScript">
    <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
</th:block>
</body>
</html>
