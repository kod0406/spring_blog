<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 재설정 - JWT Blog</title>
    <th:block th:replace="~{fragments/common :: bootstrapCss}"></th:block>
</head>
<body class="bg-light">
<div th:replace="~{fragments/common :: authNavbar('reset')}"></div>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header"><h1 class="h4 text-center mb-0">비밀번호 재설정</h1></div>
                <div class="card-body">
                    <div th:replace="~{fragments/common :: flash}"></div>
                    <div class="alert alert-info">가입한 이메일로 받은 인증 코드를 확인한 뒤 새 비밀번호를 설정합니다.</div>

                    <form id="emailForm">
                        <div class="mb-3">
                            <label for="email" class="form-label">가입 이메일</label>
                            <input type="email" class="form-control" id="email" name="email" placeholder="example@email.com" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary" id="requestCodeButton">인증 코드 발송</button>
                        </div>
                    </form>

                    <div class="text-center mt-3">
                        <p><a href="/login">로그인으로 돌아가기</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div class="modal fade" id="passwordModal" tabindex="-1" aria-labelledby="passwordModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="passwordModalLabel">새 비밀번호 설정</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="passwordForm" th:action="@{/reset-password}" method="post">
                <div class="modal-body">
                    <input type="hidden" id="modalEmail" name="email">
                    <div class="mb-3">
                        <label for="verificationCode" class="form-label">이메일 인증 코드</label>
                        <input type="text" class="form-control" id="verificationCode" name="verificationCode" required inputmode="numeric" autocomplete="one-time-code">
                    </div>
                    <div class="mb-3">
                        <label for="newPassword" class="form-label">새 비밀번호</label>
                        <input type="password" class="form-control" id="newPassword" name="newPassword" required minlength="4">
                    </div>
                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label">새 비밀번호 확인</label>
                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required minlength="4">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="submit" class="btn btn-primary">비밀번호 변경</button>
                </div>
            </form>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/common :: bootstrapScript}"></th:block>
<script>
    document.getElementById('emailForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const button = document.getElementById('requestCodeButton');
        button.disabled = true;
        try {
            const response = await fetch('/api/user/reset-password/request-code', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email})
            });
            const result = await response.json();
            if (!response.ok || !result.success) {
                alert(result.message || '인증 코드 요청에 실패했습니다.');
                return;
            }
            document.getElementById('modalEmail').value = email;
            new bootstrap.Modal(document.getElementById('passwordModal')).show();
        } catch (error) {
            alert('인증 코드 요청에 실패했습니다.');
        } finally {
            button.disabled = false;
        }
    });

    document.getElementById('passwordForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('modalEmail').value;
        const verificationCode = document.getElementById('verificationCode').value.trim();
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        if (newPassword !== confirmPassword) {
            alert('새 비밀번호와 확인 비밀번호가 일치하지 않습니다.');
            return;
        }
        const response = await fetch('/api/user/reset-password', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email, verificationCode, newPassword, confirmPassword})
        });
        const result = await response.json();
        if (result.success) {
            alert('비밀번호가 변경되었습니다. 새 비밀번호로 로그인해 주세요.');
            window.location.href = '/login';
        } else {
            alert(result.message || '비밀번호 변경에 실패했습니다.');
        }
    });
</script>
</body>
</html>
