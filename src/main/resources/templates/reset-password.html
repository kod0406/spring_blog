<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 재설정 - 간단 게시판</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- 네비게이션 바 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">간단 게시판</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/login">로그인</a>
                <a class="nav-link" href="/register">회원가입</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h3 class="text-center">비밀번호 재설정</h3>
                    </div>
                    <div class="card-body">
                        <!-- 메시지 표시 -->
                        <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
                            <span th:text="${message}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        
                        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                            <span th:text="${error}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <div class="alert alert-info" role="alert">
                            <strong>안내:</strong> 가입하신 이메일을 입력하면 새 비밀번호를 설정할 수 있습니다.
                        </div>

                        <form id="emailForm">
                            <div class="mb-3">
                                <label for="email" class="form-label">가입시 사용한 이메일</label>
                                <input type="email" class="form-control" id="email" name="email" placeholder="example@email.com" required>
                            </div>
                            
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">이메일 확인</button>
                            </div>
                        </form>
                        
                        <div class="text-center mt-3">
                            <p><a href="/login">로그인 페이지로 돌아가기</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 새 비밀번호 입력 모달 -->
    <div class="modal fade" id="passwordModal" tabindex="-1" aria-labelledby="passwordModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="passwordModalLabel">새 비밀번호 설정</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="passwordForm" th:action="@{/reset-password}" method="post">
                    <div class="modal-body">
                        <input type="hidden" id="modalEmail" name="email">
                        <div class="mb-3">
                            <label for="newPassword" class="form-label">새 비밀번호</label>
                            <input type="password" class="form-control" id="newPassword" name="newPassword" required minlength="4">
                        </div>
                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">새 비밀번호 확인</label>
                            <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required minlength="4">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                        <button type="submit" class="btn btn-primary">비밀번호 변경</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 이메일 확인 폼 처리
        document.getElementById('emailForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            
            try {
                const response = await fetch('/api/user/reset-password/check-email', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email: email })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // 이메일이 존재하면 모달 열기
                    document.getElementById('modalEmail').value = email;
                    const modal = new bootstrap.Modal(document.getElementById('passwordModal'));
                    modal.show();
                } else {
                    alert('해당 이메일로 가입된 계정이 없습니다.');
                }
            } catch (error) {
                alert('오류가 발생했습니다: ' + error.message);
            }
        });
        
        // 비밀번호 변경 폼 처리 (API 사용)
        document.getElementById('passwordForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('modalEmail').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (newPassword !== confirmPassword) {
                alert('새 비밀번호와 확인 비밀번호가 일치하지 않습니다.');
                return;
            }

            try {
                const response = await fetch('/api/user/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        newPassword: newPassword,
                        confirmPassword: confirmPassword
                    })
                });

                const result = await response.text();

                if (response.ok) {
                    alert('비밀번호가 성공적으로 변경되었습니다. 새 비밀번호로 로그인해주세요.');
                    window.location.href = '/login';
                } else {
                    alert('비밀번호 변경 실패: ' + result);
                }
            } catch (error) {
                alert('오류가 발생했습니다: ' + error.message);
            }
        });
    </script>
</body>
</html>
