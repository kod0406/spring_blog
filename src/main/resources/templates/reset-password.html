<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 재설정 - JWT Blog</title>
    <th:block th:replace="~{fragments/common :: bootstrapCss}"></th:block>
</head>
<body>
<a class="skip-link" href="#main-content">본문으로 건너뛰기</a>
<div th:replace="~{fragments/common :: authNavbar('reset')}"></div>
<main id="main-content" class="container auth-shell">
    <section class="auth-card" aria-labelledby="reset-heading">
        <header class="auth-card-header"><div class="auth-mark" aria-hidden="true">↻</div><h1 id="reset-heading">비밀번호 재설정</h1><p>가입 이메일로 받은 인증 코드를 사용해 새 비밀번호를 설정합니다.</p></header>
        <div th:replace="~{fragments/common :: flash}"></div>
        <div id="resetMessage" class="inline-message" role="status" aria-live="polite"></div>
        <form id="emailForm">
            <div class="mb-3"><label for="email" class="form-label">가입 이메일</label><input type="email" class="form-control" id="email" name="email" autocomplete="email" placeholder="example@email.com" required></div>
            <div class="d-grid"><button type="submit" class="btn btn-primary" id="requestCodeButton">인증 코드 발송</button></div>
        </form>
        <div class="auth-links"><p><a href="/login">로그인으로 돌아가기</a></p></div>
    </section>
</main>

<div class="modal fade" id="passwordModal" tabindex="-1" aria-labelledby="passwordModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered"><div class="modal-content">
        <div class="modal-header"><h2 class="modal-title fs-5" id="passwordModalLabel">새 비밀번호 설정</h2><button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="닫기"></button></div>
        <form id="passwordForm">
            <div class="modal-body">
                <div id="passwordMessage" class="inline-message" role="status" aria-live="polite"></div>
                <input type="hidden" id="modalEmail" name="email">
                <div class="mb-3"><label for="verificationCode" class="form-label">이메일 인증 코드</label><input type="text" class="form-control" id="verificationCode" name="verificationCode" required inputmode="numeric" autocomplete="one-time-code"></div>
                <div class="mb-3"><label for="newPassword" class="form-label">새 비밀번호</label><input type="password" class="form-control" id="newPassword" name="newPassword" required minlength="4" autocomplete="new-password"></div>
                <div class="mb-3"><label for="confirmPassword" class="form-label">새 비밀번호 확인</label><input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required minlength="4" autocomplete="new-password"></div>
            </div>
            <div class="modal-footer"><button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">취소</button><button type="submit" class="btn btn-primary" id="resetPasswordButton">비밀번호 변경</button></div>
        </form>
    </div></div>
</div>

<th:block th:replace="~{fragments/common :: footer}"></th:block>
<th:block th:replace="~{fragments/common :: bootstrapScript}"></th:block>
<script>
    const resetMessage = document.getElementById('resetMessage');
    const passwordMessage = document.getElementById('passwordMessage');
    const passwordModal = bootstrap.Modal.getOrCreateInstance(document.getElementById('passwordModal'));
    function setInlineMessage(element, message, type) { element.className = `inline-message is-visible is-${type}`; element.textContent = message; }

    document.getElementById('emailForm').addEventListener('submit', async event => {
        event.preventDefault();
        const email = document.getElementById('email').value.trim();
        const button = document.getElementById('requestCodeButton');
        button.disabled = true; button.textContent = '발송 중…';
        try {
            const response = await fetch('/api/user/reset-password/request-code', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email})});
            const result = await response.json();
            if (!response.ok || !result.success) throw new Error(result.message || '인증 코드 요청에 실패했습니다.');
            document.getElementById('modalEmail').value = email;
            setInlineMessage(resetMessage, result.message || '인증 코드를 발송했습니다.', 'success');
            passwordModal.show();
        } catch (error) { setInlineMessage(resetMessage, error.message || '인증 코드 요청에 실패했습니다.', 'error'); }
        finally { button.disabled = false; button.textContent = '인증 코드 발송'; }
    });

    document.getElementById('passwordForm').addEventListener('submit', async event => {
        event.preventDefault();
        const email = document.getElementById('modalEmail').value;
        const verificationCode = document.getElementById('verificationCode').value.trim();
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        if (newPassword !== confirmPassword) { setInlineMessage(passwordMessage, '새 비밀번호와 확인 비밀번호가 일치하지 않습니다.', 'error'); return; }
        const button = document.getElementById('resetPasswordButton');
        button.disabled = true; button.textContent = '변경 중…';
        try {
            const response = await fetch('/api/user/reset-password', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email, verificationCode, newPassword, confirmPassword})});
            const result = await response.json();
            if (!response.ok || !result.success) throw new Error(result.message || '비밀번호 변경에 실패했습니다.');
            setInlineMessage(passwordMessage, '비밀번호가 변경되었습니다. 로그인 화면으로 이동합니다.', 'success');
            window.setTimeout(() => window.location.assign('/login'), 900);
        } catch (error) { setInlineMessage(passwordMessage, error.message || '비밀번호 변경에 실패했습니다.', 'error'); button.disabled = false; button.textContent = '비밀번호 변경'; }
    });
</script>
</body>
</html>
