<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새 글 - JWT Blog</title>
    <th:block th:replace="~{fragments/common :: bootstrapCss}"></th:block>
    <th:block th:replace="~{fragments/common :: toastEditorCss}"></th:block>
    <th:block th:replace="~{fragments/common :: baseStyle}"></th:block>
</head>
<body>
<div th:replace="~{fragments/common :: navbar('write')}"></div>

<main class="container py-4">
    <div th:replace="~{fragments/common :: flash}"></div>
    <section class="bg-white border rounded p-4">
        <h1 class="h3 mb-4">새 글 쓰기</h1>
        <form th:action="@{/admin/posts}" method="post" th:object="${boardDto}" id="postForm">
            <input type="hidden" th:field="*{contentMarkdown}" id="contentMarkdown">
            <div class="mb-3">
                <label for="title" class="form-label">제목</label>
                <input type="text" class="form-control" id="title" th:field="*{title}" maxlength="200" required>
            </div>
            <div class="row">
                <div class="col-md-8 mb-3">
                    <label for="categoryKey" class="form-label">글머리</label>
                    <select class="form-select" id="categoryKey" th:field="*{categoryKey}">
                        <option value="">미분류</option>
                        <option th:each="category : ${categories}" th:value="${category.key}"
                                th:text="${category.displayName + ' - ' + category.visibility}">글머리</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3 d-flex align-items-end">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" th:field="*{published}" id="published" checked>
                        <label class="form-check-label" for="published">공개</label>
                    </div>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">본문</label>
                <div class="d-flex gap-2 mb-2">
                    <input type="file" class="form-control form-control-sm" id="videoFile" accept="video/mp4,video/webm">
                    <button type="button" class="btn btn-outline-secondary btn-sm" onclick="uploadVideo()">영상 삽입</button>
                </div>
                <div id="editor"></div>
            </div>
            <div class="d-flex justify-content-between">
                <a href="/posts" class="btn btn-outline-secondary">취소</a>
                <button type="submit" class="btn btn-primary">작성</button>
            </div>
        </form>
    </section>
</main>

<th:block th:replace="~{fragments/common :: toastEditorScript}"></th:block>
<script>
    const editor = new toastui.Editor({
        el: document.querySelector('#editor'),
        height: '520px',
        initialEditType: 'markdown',
        previewStyle: 'vertical',
        hooks: {
            addImageBlobHook: async (blob, callback) => {
                const formData = new FormData();
                formData.append('file', blob);
                const res = await fetch('/api/admin/uploads/images', { method: 'POST', body: formData });
                const json = await res.json();
                if (!json.success) {
                    alert(json.message);
                    return;
                }
                callback(json.data.url, blob.name);
            }
        }
    });
    async function uploadVideo() {
        const input = document.querySelector('#videoFile');
        if (!input.files.length) return;
        const formData = new FormData();
        formData.append('file', input.files[0]);
        const res = await fetch('/api/admin/uploads/videos', { method: 'POST', body: formData });
        const json = await res.json();
        if (!json.success) {
            alert(json.message);
            return;
        }
        editor.insertText(`\n![video](${json.data.url})\n`);
        input.value = '';
    }
    document.querySelector('#postForm').addEventListener('submit', () => {
        document.querySelector('#contentMarkdown').value = editor.getMarkdown();
    });
</script>
<th:block th:replace="~{fragments/common :: bootstrapScript}"></th:block>
</body>
</html>
