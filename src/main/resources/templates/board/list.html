<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글 목록 - JWT Blog</title>
    <th:block th:replace="~{fragments/common :: bootstrapCss}"></th:block>
    <th:block th:replace="~{fragments/common :: baseStyle}"></th:block>
    <style>
        .post-title{text-decoration:none;color:#1f2937}.post-title:hover{color:#0d6efd}
        .masked-row{background:#fff;color:#6b7280}.masked-row .masked-text{font-style:italic}
    </style>
</head>
<body>
<div th:replace="~{fragments/common :: navbar('posts')}"></div>

<main class="container py-4">
    <div th:replace="~{fragments/common :: flash}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">글 목록</h1>
        <form sec:authorize="hasRole('ADMIN')" th:action="@{/admin/posts/drafts}" method="post">
            <button type="submit" class="btn btn-primary">새 글</button>
        </form>
    </div>

    <form class="row g-2 mb-3 bg-white border rounded p-3" method="get" action="/posts">
        <input type="hidden" name="category" th:value="${selectedCategory}">
        <div class="col-md-5">
            <input class="form-control" type="search" name="keyword" th:value="${keyword}" placeholder="검색어">
        </div>
        <div class="col-md-3">
            <select class="form-select" name="searchType">
                <option value="title_content" th:selected="${searchType == 'title_content'}">제목+본문</option>
                <option value="title" th:selected="${searchType == 'title'}">제목</option>
                <option value="content" th:selected="${searchType == 'content'}">본문</option>
                <option value="comment" th:selected="${searchType == 'comment'}">댓글</option>
                <option value="author" th:selected="${searchType == 'author'}">작성자</option>
            </select>
        </div>
        <div class="col-md-2">
            <select class="form-select" name="sort">
                <option value="latest" th:selected="${sort == 'latest'}">최신순</option>
                <option value="oldest" th:selected="${sort == 'oldest'}">오래된순</option>
            </select>
        </div>
        <div class="col-md-2">
            <button class="btn btn-dark w-100" type="submit">검색</button>
        </div>
    </form>

    <div class="mb-4">
        <a class="btn btn-sm me-1"
           th:classappend="${selectedCategory == null} ? 'btn-dark' : 'btn-outline-dark'"
           th:href="@{/posts(keyword=${keyword},searchType=${searchType},sort=${sort})}">전체</a>
        <a th:each="category : ${categories}"
           class="btn btn-sm me-1"
           th:classappend="${selectedCategory == category.key} ? 'btn-dark' : 'btn-outline-dark'"
           th:href="@{/posts(category=${category.key},keyword=${keyword},searchType=${searchType},sort=${sort})}">
            <span th:text="${category.displayName}">글머리</span>
            <span th:if="${category.visibility.name() == 'PRIVATE'}" class="badge bg-secondary ms-1">PRIVATE</span>
        </a>
    </div>

    <section th:if="${posts.content.size() > 0}">
        <article class="card mb-2" th:each="post, iter : ${posts.content}" th:classappend="${post.masked} ? ' masked-row'">
            <div class="card-body">
                <div th:if="${post.masked}" class="d-flex align-items-center gap-3">
                    <span class="text-muted small" th:text="${posts.number * posts.size + iter.index + 1}">1</span>
                    <span class="masked-text">(권한 없음)</span>
                </div>
                <div th:unless="${post.masked}">
                    <div class="small text-muted mb-1">
                        <span th:text="${post.categoryDisplayName}">미분류</span>
                        <span th:if="${post.privatePost}" class="badge bg-secondary ms-1">PRIVATE</span>
                        <span th:if="${!post.published}" class="badge bg-warning text-dark ms-1">비공개</span>
                    </div>
                    <h2 class="h5">
                        <a th:href="@{/posts/{id}(id=${post.postId})}" th:text="${post.title}" class="post-title">제목</a>
                    </h2>
                    <p class="text-muted mb-2" th:text="${#strings.abbreviate(post.content, 140)}">요약</p>
                    <small class="text-muted">
                        <span th:text="${post.authorName}">작성자</span>
                        ·
                        <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">작성일</span>
                    </small>
                </div>
            </div>
        </article>
    </section>

    <section th:if="${posts.content.size() == 0}" class="text-center bg-white border rounded p-5">
        <h2 class="h5 text-muted">글이 없습니다.</h2>
    </section>

    <nav th:if="${posts.totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${posts.first} ? 'disabled'">
                <a class="page-link" th:href="@{/posts(page=${posts.number - 1},category=${selectedCategory},keyword=${keyword},searchType=${searchType},sort=${sort})}">이전</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, posts.totalPages - 1)}" th:classappend="${i == posts.number} ? 'active'">
                <a class="page-link" th:href="@{/posts(page=${i},category=${selectedCategory},keyword=${keyword},searchType=${searchType},sort=${sort})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${posts.last} ? 'disabled'">
                <a class="page-link" th:href="@{/posts(page=${posts.number + 1},category=${selectedCategory},keyword=${keyword},searchType=${searchType},sort=${sort})}">다음</a>
            </li>
        </ul>
    </nav>
</main>

<th:block th:replace="~{fragments/common :: bootstrapScript}"></th:block>
</body>
</html>
