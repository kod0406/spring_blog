<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글 목록 - JWT Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{background:#f7f8fa}.navbar-brand{font-weight:700}.post-title{text-decoration:none;color:#1f2937}.post-title:hover{color:#0d6efd}</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">JWT Blog</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link active" href="/posts">글 목록</a>
            <a sec:authorize="hasRole('ADMIN')" class="nav-link" href="/admin">관리</a>
            <a sec:authorize="hasRole('ADMIN')" class="nav-link" href="/admin/posts/new">글쓰기</a>
            <a sec:authorize="!isAuthenticated()" class="nav-link" href="/login">로그인</a>
            <a sec:authorize="!isAuthenticated()" class="nav-link" href="/register">회원가입</a>
            <form sec:authorize="isAuthenticated()" class="d-inline" th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-light btn-sm ms-2">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">글 목록</h1>
        <a sec:authorize="hasRole('ADMIN')" href="/admin/posts/new" class="btn btn-primary">새 글</a>
    </div>

    <div class="mb-4">
        <a class="btn btn-sm me-1" th:classappend="${selectedCategory == null} ? 'btn-dark' : 'btn-outline-dark'" href="/posts">전체</a>
        <a th:each="category : ${categories}"
           class="btn btn-sm me-1"
           th:classappend="${selectedCategory == category.key} ? 'btn-dark' : 'btn-outline-dark'"
           th:href="@{/posts(category=${category.key})}">
            <span th:text="${category.displayName}">글머리</span>
            <span th:if="${category.visibility.name() == 'PRIVATE'}" class="badge bg-secondary ms-1">PRIVATE</span>
        </a>
    </div>

    <section th:if="${posts.content.size() > 0}">
        <article class="card mb-3" th:each="post : ${posts.content}">
            <div class="card-body">
                <div class="small text-muted mb-1">
                    <span th:text="${post.categoryDisplayName}">미분류</span>
                    <span th:if="${post.privatePost}" class="badge bg-secondary ms-1">PRIVATE</span>
                    <span th:if="${!post.published}" class="badge bg-warning text-dark ms-1">비공개</span>
                </div>
                <h2 class="h5">
                    <a th:href="@{/posts/{id}(id=${post.postId})}" th:text="${post.title}" class="post-title">제목</a>
                </h2>
                <p class="text-muted mb-2" th:text="${#strings.abbreviate(post.content, 140)}">요약</p>
                <small class="text-muted">
                    <span th:text="${post.authorName}">작성자</span>
                    ·
                    <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">작성일</span>
                </small>
            </div>
        </article>
    </section>

    <section th:if="${posts.content.size() == 0}" class="text-center bg-white border rounded p-5">
        <h2 class="h5 text-muted">글이 없습니다.</h2>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
