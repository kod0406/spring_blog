<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시판 - 간단 게시판</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-brand {
            font-weight: bold;
        }
        .card {
            margin-bottom: 1rem;
        }
        .board-title {
            cursor: pointer;
            color: #007bff;
            text-decoration: none;
        }
        .board-title:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- 네비게이션 바 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">간단 게시판</a>

            <div class="navbar-nav ms-auto">
                <!-- 인증된 사용자용 메뉴 -->
                <div sec:authorize="isAuthenticated()">
                    <a class="nav-link d-inline" href="/board">게시판</a>
                    <a class="nav-link d-inline" href="/board/write">글쓰기</a>
                    <form class="d-inline" th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-outline-light btn-sm ms-2">로그아웃</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <!-- 메인 컨텐츠 -->
    <div class="container mt-4">
        <!-- 메시지 표시 -->
        <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- 페이지 제목 -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>게시판</h2>
            <a href="/board/write" class="btn btn-primary">글쓰기</a>
        </div>

        <!-- 게시글 목록 -->
        <div th:if="${boards.content.size() > 0}">
            <div class="card" th:each="board : ${boards.content}">
                <div class="card-body">
                    <h5 class="card-title">
                        <a th:href="@{/board/{id}(id=${board.boardId})}"
                           th:text="${board.title}"
                           class="board-title text-decoration-none"></a>
                    </h5>
                    <p class="card-text" th:text="${#strings.abbreviate(board.content, 100)}"></p>
                    <div class="d-flex justify-content-between">
                        <small class="text-muted">
                            작성자: <span th:text="${board.authorName}"></span>
                        </small>
                        <small class="text-muted" th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}"></small>
                    </div>
                </div>
            </div>
        </div>

        <!-- 게시글이 없을 때 -->
        <div th:if="${boards.content.size() == 0}" class="text-center py-5">
            <h4 class="text-muted">게시글이 없습니다.</h4>
            <p class="text-muted">첫 번째 게시글을 작성해보세요!</p>
            <a href="/board/write" class="btn btn-primary">글쓰기</a>
        </div>

        <!-- 페이징 -->
        <nav th:if="${totalPages > 1}" aria-label="Page navigation">
            <ul class="pagination justify-content-center">
                <!-- 이전 페이지 -->
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/board(page=${currentPage - 1})}" th:if="${currentPage > 0}">이전</a>
                    <span class="page-link" th:if="${currentPage == 0}">이전</span>
                </li>

                <!-- 페이지 번호들 -->
                <li class="page-item"
                    th:each="pageNum : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${pageNum == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/board(page=${pageNum})}" th:text="${pageNum + 1}"></a>
                </li>

                <!-- 다음 페이지 -->
                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/board(page=${currentPage + 1})}" th:if="${currentPage < totalPages - 1}">다음</a>
                    <span class="page-link" th:if="${currentPage == totalPages - 1}">다음</span>
                </li>
            </ul>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
