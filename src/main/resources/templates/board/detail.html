<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${post.title} + ' - kod04061's Blog'">글 상세 - kod04061's Blog</title>
    <th:block th:replace="~{fragments/common :: bootstrapCss}"></th:block>
</head>
<body>
<a class="skip-link" href="#main-content">본문으로 건너뛰기</a>
<div th:replace="~{fragments/common :: navbar('posts', true)}"></div>

<main id="main-content" class="container site-main">
    <div th:replace="~{fragments/common :: flash}"></div>
    <div class="content-shell">
        <article class="article-card">
            <header class="article-header">
                <div class="d-flex flex-wrap gap-2 align-items-center">
                    <span class="badge-soft" th:text="${post.categoryDisplayName}">미분류</span>
                    <span th:if="${post.privatePost}" class="badge-soft badge-private">PRIVATE</span>
                    <span th:if="${!post.published}" class="badge-soft badge-draft">비공개</span>
                </div>
                <h1 class="article-title" th:text="${post.title}">글 제목</h1>
                <div class="d-flex justify-content-between align-items-end gap-3 flex-wrap">
                    <div class="article-meta">
                        <span th:text="${post.authorName}">작성자</span><span aria-hidden="true">·</span>
                        <time th:datetime="${post.createdAt}" th:text="${#temporals.format(post.createdAt, 'yyyy.MM.dd HH:mm')}">작성일</time>
                    </div>
                    <div th:if="${isAdmin}" class="d-flex gap-2">
                        <a th:href="@{/admin/posts/{id}/edit(id=${post.postId})}" class="btn btn-outline-primary btn-sm">수정</a>
                        <form th:action="@{/admin/posts/{id}/delete(id=${post.postId})}" method="post"
                              data-confirm-title="글 삭제" data-confirm="삭제한 글과 연결된 미디어는 복구할 수 없습니다. 이 글을 삭제하시겠습니까?" data-confirm-button="삭제">
                            <button type="submit" class="btn btn-outline-danger btn-sm">삭제</button>
                        </form>
                    </div>
                </div>
            </header>
            <div class="post-content" th:utext="${post.renderedContent}">글 내용</div>
        </article>

        <section class="comments-card" aria-labelledby="comments-heading">
            <div class="comments-header"><h2 id="comments-heading">댓글</h2></div>
            <form th:if="${canComment}" id="commentForm" class="mb-3">
                <label for="commentContent" class="form-label">새 댓글</label>
                <textarea id="commentContent" class="form-control mb-2" rows="3" maxlength="2000" placeholder="댓글을 입력하세요" required></textarea>
                <div class="comment-form-actions"><button id="commentSubmit" class="btn btn-primary btn-sm" type="submit">댓글 작성</button></div>
            </form>
            <p th:if="${!canComment}" class="text-body-secondary small mb-3">승인된 회원만 댓글과 답글을 작성할 수 있습니다.</p>
            <div id="commentStatus" class="comment-status" role="status" aria-live="polite">댓글을 불러오는 중입니다.</div>
            <div id="comments" aria-live="polite"></div>
        </section>

        <div class="mt-4"><a href="/posts" class="btn btn-outline-secondary">글 목록으로</a></div>
    </div>
</main>

<th:block th:replace="~{fragments/common :: footer}"></th:block>
<script th:inline="javascript">
    (() => {
        const postId = /*[[${post.postId}]]*/ 0;
        const canComment = /*[[${canComment}]]*/ false;
        const commentsContainer = document.getElementById('comments');
        const statusElement = document.getElementById('commentStatus');
        const commentForm = document.getElementById('commentForm');
        const commentInput = document.getElementById('commentContent');
        const commentSubmit = document.getElementById('commentSubmit');
        let commentSubmitting = false;

        function setStatus(message, error = false) {
            statusElement.textContent = message;
            statusElement.classList.toggle('is-error', error);
        }

        async function loadComments() {
            setStatus('댓글을 불러오는 중입니다.');
            try {
                const response = await fetch(`/api/posts/${postId}/comments`, {credentials: 'same-origin'});
                const payload = await response.json();
                if (!response.ok || !payload.success) throw new Error(payload.message || '댓글을 불러오지 못했습니다.');
                const comments = payload.data || [];
                renderComments(comments);
                setStatus(comments.length ? '' : '아직 댓글이 없습니다. 첫 댓글을 남겨보세요.');
            } catch (error) {
                commentsContainer.replaceChildren();
                setStatus(error.message || '댓글을 불러오지 못했습니다.', true);
            }
        }

        function renderComments(comments) {
            commentsContainer.replaceChildren(...comments.map(comment => commentNode(comment)));
        }

        function commentNode(comment) {
            const article = document.createElement('article');
            article.className = 'comment';
            article.style.marginLeft = `${Math.min(Number(comment.depth) || 0, 6) * 16}px`;

            const meta = document.createElement('div');
            meta.className = 'comment-meta';
            meta.textContent = `${comment.authorName || '사용자'} · ${comment.createdAt || ''}`;
            const content = document.createElement('div');
            content.textContent = comment.content || '';
            article.append(meta, content);

            if (canComment) {
                const actions = document.createElement('div');
                actions.className = 'comment-actions';
                const replyButton = document.createElement('button');
                replyButton.type = 'button';
                replyButton.className = 'btn btn-link btn-sm p-0';
                replyButton.textContent = '답글';
                const replyTarget = document.createElement('div');
                replyButton.addEventListener('click', () => showReplyForm(replyTarget, comment.commentId, replyButton));
                actions.append(replyButton);
                article.append(actions, replyTarget);
            }

            (comment.children || []).forEach(child => article.appendChild(commentNode(child)));
            return article;
        }

        function showReplyForm(target, commentId, trigger) {
            target.replaceChildren();
            const form = document.createElement('form');
            form.className = 'mt-2';
            const label = document.createElement('label');
            label.className = 'visually-hidden';
            label.textContent = '답글 내용';
            const textarea = document.createElement('textarea');
            textarea.className = 'form-control form-control-sm mb-2';
            textarea.rows = 2;
            textarea.maxLength = 2000;
            textarea.required = true;
            label.htmlFor = `reply-input-${commentId}`;
            textarea.id = label.htmlFor;
            const buttons = document.createElement('div');
            buttons.className = 'd-flex gap-2';
            const submit = document.createElement('button');
            submit.type = 'submit';
            submit.className = 'btn btn-primary btn-sm';
            submit.textContent = '답글 작성';
            const cancel = document.createElement('button');
            cancel.type = 'button';
            cancel.className = 'btn btn-outline-secondary btn-sm';
            cancel.textContent = '취소';
            cancel.addEventListener('click', () => { target.replaceChildren(); trigger.focus(); });
            buttons.append(submit, cancel);
            form.append(label, textarea, buttons);
            let replySubmitting = false;
            form.addEventListener('submit', async event => {
                event.preventDefault();
                if (replySubmitting) return;
                replySubmitting = true;
                submit.disabled = true;
                submit.textContent = '등록 중…';
                if (await postComment(`/api/comments/${commentId}/replies`, textarea.value)) {
                    await loadComments();
                } else {
                    replySubmitting = false;
                    submit.disabled = false;
                    submit.textContent = '답글 작성';
                }
            });
            target.append(form);
            textarea.focus();
        }

        async function postComment(url, content) {
            const normalized = content.trim();
            if (!normalized) { setStatus('댓글 내용을 입력해 주세요.', true); return false; }
            setStatus('댓글을 등록하는 중입니다.');
            try {
                const response = await fetch(url, {
                    method: 'POST', credentials: 'same-origin',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({content: normalized})
                });
                const payload = await response.json();
                if (!response.ok || !payload.success) throw new Error(payload.message || '댓글 등록에 실패했습니다.');
                setStatus('댓글이 등록되었습니다.');
                return true;
            } catch (error) {
                setStatus(error.message || '댓글 등록에 실패했습니다.', true);
                return false;
            }
        }

        if (commentForm) {
            commentForm.addEventListener('submit', async event => {
                event.preventDefault();
                if (commentSubmitting) return;
                commentSubmitting = true;
                commentSubmit.disabled = true;
                commentSubmit.textContent = '등록 중…';
                try {
                    if (await postComment(`/api/posts/${postId}/comments`, commentInput.value)) {
                        commentInput.value = '';
                        await loadComments();
                    }
                } finally {
                    commentSubmitting = false;
                    commentSubmit.disabled = false;
                    commentSubmit.textContent = '댓글 작성';
                }
            });
        }
        loadComments();
    })();
</script>
<th:block th:replace="~{fragments/common :: bootstrapScript}"></th:block>
</body>
</html>
