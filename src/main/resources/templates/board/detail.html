<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${board.title} + ' - 간단 게시판'">게시글 상세보기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- 네비게이션 바 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">간단 게시판</a>

            <div class="navbar-nav ms-auto">
                <div sec:authorize="isAuthenticated()">
                    <a class="nav-link d-inline" href="/board/write">글쓰기</a>
                    <form class="d-inline" th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-outline-light btn-sm ms-2">로그아웃</button>
                    </form>
                </div>

                <div sec:authorize="!isAuthenticated()">
                    <a class="nav-link d-inline" href="/login">로그인</a>
                    <a class="nav-link d-inline ms-2" href="/register">회원가입</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- 메시지 표시 -->
        <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <div class="d-flex justify-content-between align-items-center">
                            <h3 th:text="${board.title}">게시글 제목</h3>
                            <!-- 작성자만 수정/삭제 버튼 표시 -->
                            <div th:if="${isAuthor}" class="btn-group">
                                <a th:href="@{/board/{id}/edit(id=${board.boardId})}" class="btn btn-outline-primary btn-sm">수정</a>
                                <button type="button" class="btn btn-outline-danger btn-sm" data-bs-toggle="modal" data-bs-target="#deleteModal">삭제</button>
                            </div>
                        </div>
                        <div class="d-flex justify-content-between mt-2">
                            <small class="text-muted">
                                작성자: <span th:text="${board.authorName}"></span>
                            </small>
                            <div>
                                <small class="text-muted">
                                    작성일: <span th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                                </small>
                                <small class="text-muted ms-3" th:if="${board.updatedAt != board.createdAt}">
                                    수정일: <span th:text="${#temporals.format(board.updatedAt, 'yyyy-MM-dd HH:mm')}"></span>
                                </small>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div th:text="${board.content}" style="white-space: pre-wrap; min-height: 200px;">
                            게시글 내용
                        </div>
                    </div>
                    <div class="card-footer">
                        <div class="d-flex justify-content-between">
                            <a href="/" class="btn btn-secondary">목록으로</a>
                            <a sec:authorize="isAuthenticated()" href="/board/write" class="btn btn-primary">새 글 쓰기</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 삭제 확인 모달 -->
    <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="deleteModalLabel">게시글 삭제</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    정말로 이 게시글을 삭제하시겠습니까?<br>
                    삭제된 게시글은 복구할 수 없습니다.
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                    <form th:action="@{/board/{id}/delete(id=${board.boardId})}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-danger">삭제</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
