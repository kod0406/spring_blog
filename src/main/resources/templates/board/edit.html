<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${draft} ? '새 글 - kod04061\'s Blog' : '글 수정 - kod04061\'s Blog'">글 편집 - kod04061's Blog</title>
    <th:block th:replace="~{fragments/common :: bootstrapCss}"></th:block>
    <th:block th:replace="~{fragments/common :: toastEditorCss}"></th:block>
</head>
<body>
<a class="skip-link" href="#main-content">본문으로 건너뛰기</a>
<div th:replace="~{fragments/common :: navbar('write', false)}"></div>

<main id="main-content" class="container site-main">
    <div th:replace="~{fragments/common :: flash}"></div>
    <section class="editor-card">
        <div class="editor-toolbar">
            <div><span class="eyebrow">Editor</span><h1 class="h3 fw-bold mb-0" th:text="${draft} ? '새 글 쓰기' : '글 수정'">글 편집</h1></div>
            <span th:if="${draft}" class="badge-soft badge-draft">초안</span>
        </div>
        <div id="uploadMessage" class="inline-message" role="status" aria-live="polite"></div>
        <form th:action="@{/admin/posts/{id}/edit(id=${postId})}" method="post" th:object="${boardDto}" id="postForm">
            <input type="hidden" th:field="*{contentMarkdown}" id="contentMarkdown">
            <input type="hidden" id="postId" th:value="${postId}">
            <div class="mb-3">
                <label for="title" class="form-label">제목</label>
                <input type="text" class="form-control form-control-lg" id="title" th:field="*{title}" maxlength="200" th:required="${!draft}" placeholder="글 제목을 입력하세요">
            </div>
            <div class="row g-3">
                <div class="col-md-8">
                    <label for="categoryKey" class="form-label">글머리</label>
                    <select class="form-select" id="categoryKey" th:field="*{categoryKey}">
                        <option value="">미분류</option>
                        <option th:each="category : ${categories}" th:value="${category.key}" th:text="${category.displayName + ' - ' + category.visibility}">글머리</option>
                    </select>
                </div>
                <div class="col-md-4 d-flex align-items-end pb-2">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" role="switch" th:field="*{published}" id="published">
                        <label class="form-check-label" for="published">공개 게시</label>
                    </div>
                </div>
            </div>
            <div class="mt-4 mb-3">
                <div class="d-flex flex-wrap justify-content-between align-items-end gap-2 mb-2">
                    <label class="form-label mb-0" id="editorLabel">본문</label>
                    <div class="d-flex flex-grow-1 flex-sm-grow-0 gap-2">
                        <label class="visually-hidden" for="videoFile">삽입할 영상</label>
                        <input type="file" class="form-control form-control-sm" id="videoFile" accept="video/mp4,video/webm">
                        <button type="button" class="btn btn-outline-secondary btn-sm text-nowrap" id="videoUploadButton">영상 삽입</button>
                    </div>
                </div>
                <div id="editor" aria-labelledby="editorLabel"></div>
            </div>
            <div class="d-flex flex-wrap justify-content-between gap-2 pt-2">
                <button th:if="${draft}" type="submit" class="btn btn-outline-danger"
                        th:formaction="@{/admin/posts/{id}/cancel(id=${postId})}" formmethod="post" formnovalidate
                        data-confirm-title="초안 취소" data-confirm="작성 중인 초안을 삭제하시겠습니까?" data-confirm-button="초안 삭제">초안 취소</button>
                <a th:if="${!draft}" th:href="@{/posts/{id}(id=${postId})}" class="btn btn-outline-secondary">돌아가기</a>
                <div class="d-flex gap-2 ms-auto">
                    <button type="submit" class="btn btn-outline-primary" th:formaction="@{/admin/posts/{id}/draft(id=${postId})}" formmethod="post" formnovalidate>임시 저장</button>
                    <button type="submit" class="btn btn-primary" th:text="${draft} ? '게시' : '저장'">저장</button>
                </div>
            </div>
        </form>
    </section>
</main>

<th:block th:replace="~{fragments/common :: footer}"></th:block>
<th:block th:replace="~{fragments/common :: toastEditorScript}"></th:block>
<script th:inline="javascript">
    const postId = Number(/*[[${postId}]]*/ 0);
    const initialContent = /*[[${boardDto.contentMarkdown}]]*/ '';
    const messageBox = document.getElementById('uploadMessage');
    const editor = new toastui.Editor({
        el: document.querySelector('#editor'),
        height: '560px',
        initialValue: initialContent || '',
        initialEditType: 'markdown',
        previewStyle: window.innerWidth < 992 ? 'tab' : 'vertical',
        hooks: {
            addImageBlobHook: async (blob, callback) => {
                const result = await uploadMedia('/api/admin/uploads/images', blob);
                if (result) callback(result.url, blob.name || 'image');
            }
        }
    });

    document.getElementById('videoUploadButton').addEventListener('click', async () => {
        const input = document.getElementById('videoFile');
        if (!input.files.length) { showUploadMessage('삽입할 영상 파일을 선택해 주세요.', 'error'); return; }
        const result = await uploadMedia('/api/admin/uploads/videos', input.files[0]);
        if (result) { editor.insertText(`\n![video](${result.url})\n`); input.value = ''; }
    });

    async function uploadMedia(url, file) {
        const formData = new FormData();
        formData.append('postId', String(postId));
        formData.append('file', file);
        showUploadMessage('미디어를 업로드하는 중입니다.', 'success');
        try {
            const response = await fetch(url, {method: 'POST', body: formData});
            const payload = await responsePayload(response);
            if (!response.ok || !payload.json || !payload.json.success) {
                showUploadMessage(messageForStatus(response.status, payload), 'error');
                return null;
            }
            showUploadMessage('미디어가 업로드되었습니다.', 'success');
            return payload.json.data;
        } catch (error) {
            showUploadMessage('미디어 업로드 중 네트워크 오류가 발생했습니다.', 'error');
            return null;
        }
    }
    async function responsePayload(response) {
        const text = await response.text();
        try { return {json: text ? JSON.parse(text) : null, text}; } catch (error) { return {json: null, text}; }
    }
    function messageForStatus(status, payload) {
        if (payload.json && payload.json.message) return payload.json.message;
        if (status === 400) return '파일 형식과 입력값을 확인해 주세요.';
        if (status === 401) return '로그인이 만료되었습니다. 다시 로그인해 주세요.';
        if (status === 403) return '미디어 업로드 권한이 없습니다.';
        if (status === 413) return '업로드 가능한 파일 크기를 초과했습니다.';
        if (status === 503) return '미디어 저장소를 사용할 수 없습니다.';
        return payload.text || '미디어 업로드에 실패했습니다.';
    }
    function showUploadMessage(message, type) {
        messageBox.className = `inline-message is-visible is-${type}`;
        messageBox.textContent = message;
    }
    document.getElementById('postForm').addEventListener('submit', () => {
        document.getElementById('contentMarkdown').value = editor.getMarkdown();
    });
</script>
<th:block th:replace="~{fragments/common :: bootstrapScript}"></th:block>
</body>
</html>
