<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이메일 발송 테스트 - JWT Blog</title>
    <th:block th:replace="~{fragments/common :: bootstrapCss}"></th:block>
</head>
<body>
<a class="skip-link" href="#main-content">본문으로 건너뛰기</a>
<div th:replace="~{fragments/common :: authNavbar('email')}"></div>
<main id="main-content" class="container site-main">
    <header class="page-heading"><span class="eyebrow">Development Tool</span><h1>이메일 발송 테스트</h1><p>개발 환경에서 텍스트·HTML 메일 전송 상태를 확인합니다.</p></header>
    <div class="row g-3">
        <div class="col-md-6">
            <section class="admin-panel h-100"><div class="admin-panel-header"><h2>텍스트 메일</h2><span class="badge-soft">TEXT</span></div><p class="text-body-secondary">기본 텍스트 형식의 테스트 메일을 발송합니다.</p>
                <form data-email-test data-url="/email/send-simple"><label class="form-label" for="simple-email">받는 이메일</label><input class="form-control mb-3" type="email" id="simple-email" name="email" required><button class="btn btn-primary" type="submit">텍스트 메일 발송</button><div class="inline-message mt-3" role="status" aria-live="polite"></div></form>
            </section>
        </div>
        <div class="col-md-6">
            <section class="admin-panel h-100"><div class="admin-panel-header"><h2>HTML 메일</h2><span class="badge-soft badge-private">HTML</span></div><p class="text-body-secondary">HTML 형식이 적용된 테스트 메일을 발송합니다.</p>
                <form data-email-test data-url="/email/send-html"><label class="form-label" for="html-email">받는 이메일</label><input class="form-control mb-3" type="email" id="html-email" name="email" required><button class="btn btn-primary" type="submit">HTML 메일 발송</button><div class="inline-message mt-3" role="status" aria-live="polite"></div></form>
            </section>
        </div>
    </div>
</main>
<th:block th:replace="~{fragments/common :: footer}"></th:block>
<th:block th:replace="~{fragments/common :: bootstrapScript}"></th:block>
<script>
    document.querySelectorAll('[data-email-test]').forEach(form => form.addEventListener('submit', async event => {
        event.preventDefault();
        const button = form.querySelector('button');
        const result = form.querySelector('.inline-message');
        const email = form.elements.email.value.trim();
        button.disabled = true; button.textContent = '발송 중…';
        try {
            const response = await fetch(form.dataset.url, {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email})});
            const payload = await response.json();
            if (!response.ok) throw new Error(payload.message || '메일 발송에 실패했습니다.');
            result.className = 'inline-message is-visible is-success mt-3'; result.textContent = payload.message || '메일을 발송했습니다.';
        } catch (error) { result.className = 'inline-message is-visible is-error mt-3'; result.textContent = error.message || '메일 발송에 실패했습니다.'; }
        finally { button.disabled = false; button.textContent = form.dataset.url.endsWith('html') ? 'HTML 메일 발송' : '텍스트 메일 발송'; }
    }));
</script>
</body>
</html>
