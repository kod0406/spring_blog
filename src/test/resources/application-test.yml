spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:jwt_blog_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  data:
    redis:
      host: localhost
      port: 6379
      password:
      repositories:
        enabled: false
  mail:
    host: localhost
    port: 1025
    username:
    password:

jwt:
  secret: local-test-secret-key-for-jwt-blog-1234567890
  refresh-Millis: 21600000
  expiration-Millis: 300000
  access-cookie-name: jwt_token
  refresh-cookie-name: jwt_refresh_token

app:
  email-verification:
    enabled: false
  admin:
    email: admin@example.com
    password: adminpass
    name: Admin
  owner:
    email: owner@example.com
    password: ownerpass
    name: Owner

oci:
  object-storage:
    enabled: false
    image-bucket:
    video-bucket:
    public-base-url:
